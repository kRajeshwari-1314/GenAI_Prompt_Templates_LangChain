<!doctype html>
<html>
  <head>
    <title>AI Resume Screener</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI";
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
      }

      .container {
        width: 60%;
        margin: 40px auto;
        padding: 30px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(15px);
      }

      textarea,
      input[type="file"] {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
      }

      button {
        width: 100%;
        padding: 12px;
        background: linear-gradient(90deg, #00c6ff, #0072ff);
        border: none;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      .progress {
        background: #ddd;
        border-radius: 20px;
        overflow: hidden;
      }

      .low {
        background: #e74c3c;
      }
      .medium {
        background: #f39c12;
      }
      .high {
        background: #2ecc71;
      }

      .progress-bar {
        padding: 10px;
        text-align: center;
        color: white;
      }

      .tag {
        display: inline-block;
        background: #2ecc71;
        padding: 5px 10px;
        border-radius: 10px;
        margin: 3px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>🚀 AI Resume Screening</h1>

      <form method="POST" enctype="multipart/form-data">
        <label>Upload Resume (PDF)</label>
        <input type="file" name="resume_file" />

        <label>OR Paste Resume</label>
        <textarea name="resume" rows="4"></textarea>

        <label>Job Description</label>
        <textarea name="jd" rows="4"></textarea>

        <button type="submit" onclick="this.innerText = 'Analyzing...'">
          Analyze
        </button>
      </form>

      {% if result %}
      <h2>📊 Result</h2>

      <p>👤 {{ result.name }}</p>

      <p>
        {% for skill in result.skills %}
        <span class="tag">{{ skill }}</span>
        {% endfor %}
      </p>

      <p>✅ Matched Skills:</p>
      {% for skill in result.matched_skills %}
      <span class="tag">{{ skill }}</span>
      {% endfor %}

      <div class="progress">
        <div
          class="progress-bar {% if result.final_score < 40 %}low {% elif result.final_score < 70 %}medium {% else %}high{% endif %}"
          style="width: {{ result.final_score }}%"
        >
          {{ result.final_score }}%
        </div>
      </div>

      <p>💡 {{ result.explanation }}</p>

      <form action="/download" method="POST">
        <input type="hidden" name="data" value="{{ result | tojson }}" />
        <button type="submit">Download Result</button>
      </form>

      {% endif %}
    </div>
  </body>
</html>
